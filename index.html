<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Emma Addams — Luxury Experience</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Montserrat:wght@200;300;400;500;600&family=Aref+Ruqaa:wght@400;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Montserrat', sans-serif; background: #000; color: #f5f5f5; -webkit-font-smoothing: antialiased; }

/* ===== PRELOADER ===== */
#preloader {
  position: fixed; inset: 0; z-index: 10000;
  background: #0a0a0a;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  transition: opacity 1.2s cubic-bezier(0.77, 0, 0.175, 1), visibility 1.2s ease;
}
#preloader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
.preloader-brand {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(28px, 5vw, 56px);
  font-weight: 300; letter-spacing: 0.35em;
  color: #c9a96e; margin-bottom: 40px;
  opacity: 0; animation: preloadFade 1.4s ease 0.3s forwards;
}
.preloader-line {
  width: 0; height: 1px;
  background: linear-gradient(90deg, transparent, #c9a96e, transparent);
  margin-bottom: 30px;
  animation: lineExpand 1.8s cubic-bezier(0.77, 0, 0.175, 1) 0.5s forwards;
}
@keyframes lineExpand { to { width: 200px; } }
.preloader-bar-wrap {
  width: 160px; height: 2px; background: rgba(255,255,255,0.08);
  border-radius: 2px; overflow: hidden;
  opacity: 0; animation: preloadFade 0.8s ease 0.8s forwards;
}
.preloader-bar-fill {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, #c9a96e, #e8d5a3, #c9a96e);
  background-size: 200% 100%;
  border-radius: 2px;
  animation: barShine 1.2s linear infinite;
  transition: width 0.15s linear;
}
@keyframes barShine {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
.preloader-pct {
  font-size: 11px; font-weight: 300; letter-spacing: 0.3em;
  color: rgba(255,255,255,0.3); margin-top: 16px;
  opacity: 0; animation: preloadFade 0.8s ease 1s forwards;
}
@keyframes preloadFade { to { opacity: 1; } }

/* ===== BACKGROUND SLIDER ===== */
.bg-slider { position: fixed; inset: 0; z-index: 0; overflow: hidden; }
.bg-slide {
  position: absolute; inset: -5%;
  background-size: cover; background-position: center;
  background-repeat: no-repeat;
  opacity: 0;
  transition: opacity 1.8s cubic-bezier(0.77, 0, 0.175, 1), transform 7s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  transform: scale(1); will-change: transform, opacity;
}
.bg-slide.active { opacity: 1; transform: scale(1.08); z-index: 1; }
.bg-slide.prev { opacity: 0; transform: scale(1.12); z-index: 0; }

.bg-overlay {
  position: fixed; inset: 0; z-index: 1;
  background: linear-gradient(135deg, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0.45) 50%, rgba(0,0,0,0.7) 100%);
}
.bg-overlay::after {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at center, transparent 0%, rgba(0,0,0,0.4) 100%);
}

/* ===== PARTICLES ===== */
#particles-canvas { position: fixed; inset: 0; z-index: 2; pointer-events: none; }

/* ===== MAIN CONTENT ===== */
.main-content {
  position: fixed; inset: 0; z-index: 5;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 40px 24px;
  pointer-events: none;
}
.main-content > * { pointer-events: auto; }

.brand-intro {
  font-family: 'Aref Ruqaa', serif;
  font-size: clamp(24px, 3.5vw, 44px);
  font-weight: 400;
  color: rgba(255,255,255,0.45);
  margin-bottom: 10px;
  letter-spacing: 0;
  text-transform: none;
  opacity: 0; transform: translateY(20px);
  animation: fadeUp 1.8s cubic-bezier(0.77, 0, 0.175, 1) 2.2s forwards;
}
.brand-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(48px, 10vw, 140px);
  font-weight: 300; letter-spacing: 0.12em;
  color: #f5f5f5;
  line-height: 1; margin-bottom: 20px;
  text-shadow: 0 2px 40px rgba(0,0,0,0.5);
  opacity: 0; transform: translateY(30px);
  animation: fadeUp 1.8s cubic-bezier(0.77, 0, 0.175, 1) 2.4s forwards;
}
.brand-title .gold { color: #c9a96e; }
.brand-tagline {
  font-family: 'Aref Ruqaa', serif;
  font-size: clamp(18px, 2vw, 28px);
  font-weight: 400;
  color: rgba(255,255,255,0.5);
  letter-spacing: 0;
  position: relative;
  height: calc(clamp(18px, 2vw, 28px) * 2.2);
  display: flex; align-items: center; justify-content: center;
  opacity: 0;
  animation: fadeUp 1.8s cubic-bezier(0.77, 0, 0.175, 1) 2.8s forwards;
}
.brand-tagline .rot {
  position: absolute;
  opacity: 0; transform: translateY(14px) scale(0.95);
  filter: blur(6px);
  transition: opacity 0.9s cubic-bezier(0.77, 0, 0.175, 1),
              transform 0.9s cubic-bezier(0.77, 0, 0.175, 1),
              filter 0.9s cubic-bezier(0.77, 0, 0.175, 1);
  white-space: nowrap;
}
.brand-tagline .rot.show { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
.brand-tagline .rot.hide { opacity: 0; transform: translateY(-14px) scale(0.95); filter: blur(6px); }
.brand-line {
  width: 0; height: 1px;
  background: linear-gradient(90deg, transparent, #c9a96e, transparent);
  margin: 28px auto;
  animation: lineExpandGold 2s cubic-bezier(0.77, 0, 0.175, 1) 3s forwards;
}
@keyframes lineExpandGold { to { width: clamp(60px, 15vw, 120px); } }
@keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

/* ===== MUSIC CONTROLS ===== */
.music-controls {
  position: fixed; top: 30px; right: 30px; z-index: 10;
  display: flex; align-items: center; gap: 14px;
  opacity: 0; animation: fadeUp 1.2s ease 3s forwards;
}
.music-btn {
  width: 44px; height: 44px; border-radius: 50%;
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.7); font-size: 16px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.4s ease; position: relative;
}
.music-btn:hover {
  background: rgba(255,255,255,0.12);
  border-color: rgba(201,169,110,0.4);
  color: #c9a96e; transform: scale(1.05);
}
.music-btn .icon { line-height: 1; }
.music-btn .tooltip {
  position: absolute; top: calc(100% + 8px); right: 50%; transform: translateX(50%);
  font-size: 9px; font-weight: 400; letter-spacing: 0.1em; text-transform: uppercase;
  color: rgba(255,255,255,0.5);
  background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  padding: 4px 10px; border-radius: 4px;
  white-space: nowrap; opacity: 0;
  transition: opacity 0.3s ease; pointer-events: none;
}
.music-btn:hover .tooltip { opacity: 1; }
.volume-slider-wrap {
  width: 0; overflow: hidden;
  transition: width 0.4s cubic-bezier(0.77, 0, 0.175, 1);
}
.volume-slider-wrap.open { width: 80px; }
.volume-slider {
  width: 80px; height: 3px; -webkit-appearance: none; appearance: none;
  background: rgba(255,255,255,0.1);
  border-radius: 3px; outline: none; cursor: pointer;
}
.volume-slider::-webkit-slider-thumb {
  -webkit-appearance: none; width: 12px; height: 12px;
  border-radius: 50%; background: #c9a96e;
  border: 2px solid rgba(0,0,0,0.3); cursor: pointer;
  box-shadow: 0 0 12px rgba(201,169,110,0.3);
}
.volume-slider::-moz-range-thumb {
  width: 12px; height: 12px; border-radius: 50%;
  background: #c9a96e; border: 2px solid rgba(0,0,0,0.3); cursor: pointer;
}

/* ===== BOTTOM LEFT GLASS CARD ===== */
.glass-card {
  position: fixed; bottom: 90px; left: 36px; z-index: 4;
  padding: 18px 24px;
  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px;
  opacity: 0; transform: translateY(20px);
  animation: fadeUp 1.8s ease 3.2s forwards;
  pointer-events: none;
}
.glass-card p {
  font-size: clamp(9px, 0.9vw, 12px);
  font-weight: 200; letter-spacing: 0.08em;
  color: rgba(255,255,255,0.4);
  line-height: 1.6;
}

/* ===== GLOW ORBS ===== */
.glow-orb {
  position: fixed; border-radius: 50%; pointer-events: none; z-index: 0;
  filter: blur(80px); opacity: 0.15;
  animation: orbFloat 12s ease-in-out infinite;
}
.glow-orb:nth-child(1) { width: 400px; height: 400px; background: radial-gradient(circle, #c9a96e, transparent); top: -10%; left: -5%; animation-delay: 0s; }
.glow-orb:nth-child(2) { width: 300px; height: 300px; background: radial-gradient(circle, #d4af37, transparent); bottom: -5%; right: -5%; animation-delay: -4s; }
.glow-orb:nth-child(3) { width: 250px; height: 250px; background: radial-gradient(circle, #e8d5a3, transparent); top: 40%; right: 20%; animation-delay: -8s; }
@keyframes orbFloat {
  0%, 100% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(30px, -30px) scale(1.1); }
  66% { transform: translate(-20px, 20px) scale(0.95); }
}

/* ===== ABOUT SECTION ===== */
.about-section {
  position: fixed;
  inset: 0;
  z-index: 5;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 24px;
  opacity: 0;
  visibility: hidden;
  transform: scale(0.95);
  transition: opacity 1.8s cubic-bezier(0.77, 0, 0.175, 1),
              visibility 1.8s cubic-bezier(0.77, 0, 0.175, 1),
              transform 1.8s cubic-bezier(0.77, 0, 0.175, 1);
  pointer-events: none;
}
.about-section.show {
  opacity: 1;
  visibility: visible;
  transform: scale(1);
  pointer-events: auto;
}
.about-container {
  width: 100%;
  max-width: 1150px;
  background: rgba(255, 255, 255, 0.02);
  backdrop-filter: blur(25px);
  -webkit-backdrop-filter: blur(25px);
  border: 1px solid rgba(255, 255, 255, 0.07);
  border-radius: 24px;
  padding: 50px 60px;
  display: grid;
  grid-template-columns: 360px 1fr;
  gap: 60px;
  align-items: center;
  box-shadow: 0 40px 100px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.05);
  position: relative;
  overflow: hidden;
}
.about-container::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(201, 169, 110, 0.03) 0%, transparent 60%);
  pointer-events: none;
}
.about-left {
  display: flex;
  justify-content: center;
  align-items: center;
  animation: floatingAnim 6s ease-in-out infinite;
}
@keyframes floatingAnim {
  0%, 100% { transform: translateY(0px); }
  50% { transform: translateY(-12px); }
}
.fire-frame-wrapper {
  position: relative;
  width: 320px;
  height: 420px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.fire-frame-glow {
  position: absolute;
  inset: -15px;
  background: radial-gradient(circle, #ff7b00 10%, #d4af37 40%, transparent 70%);
  filter: blur(35px);
  opacity: 0.55;
  mix-blend-mode: screen;
  animation: fireFlicker 4s ease-in-out infinite alternate, morph 8s ease-in-out infinite;
}
.fire-frame {
  position: absolute;
  inset: -4px;
  padding: 4px;
  background: linear-gradient(0deg, #d4af37, #ff5e00, #ff007f, #d4af37);
  background-size: 100% 400%;
  animation: fireStream 8s linear infinite, morph 8s ease-in-out infinite;
  box-shadow: 0 0 25px rgba(212, 175, 55, 0.4), 0 0 50px rgba(255, 94, 0, 0.3);
}
.image-slideshow {
  position: relative;
  width: 100%;
  height: 100%;
  background: #111;
  overflow: hidden;
  animation: morph 8s ease-in-out infinite;
}
@keyframes fireStream {
  0% { background-position: 50% 0%; }
  100% { background-position: 50% 400%; }
}
@keyframes fireFlicker {
  0%, 100% { opacity: 0.5; transform: scale(0.98); }
  50% { opacity: 0.7; transform: scale(1.03); }
}
@keyframes morph {
  0%, 100% {
    border-radius: 42% 58% 70% 30% / 45% 45% 55% 55%;
  }
  33% {
    border-radius: 70% 30% 52% 48% / 60% 40% 60% 40%;
  }
  66% {
    border-radius: 50% 50% 30% 70% / 40% 60% 30% 70%;
  }
}
.about-slide {
  position: absolute;
  inset: -2px;
  background-size: cover;
  background-position: center;
  opacity: 0;
  filter: blur(15px);
  transform: scale(1.15);
  transition: opacity 1.5s cubic-bezier(0.4, 0, 0.2, 1),
              filter 1.5s cubic-bezier(0.4, 0, 0.2, 1);
  will-change: transform, opacity, filter;
}
@keyframes cinematicZoom {
  0% { transform: scale(1.02) rotate(0deg); }
  100% { transform: scale(1.12) rotate(1deg); }
}
.about-slide.active {
  opacity: 1;
  filter: blur(0);
  animation: cinematicZoom 6s ease-out forwards;
  z-index: 1;
}
.about-slide.prev {
  opacity: 0;
  filter: blur(15px);
  z-index: 0;
}
.about-right {
  display: flex;
  flex-direction: column;
  justify-content: center;
  text-align: left;
}
.about-title-wrap {
  margin-bottom: 24px;
  overflow: hidden;
  height: clamp(50px, 6vw, 85px);
  position: relative;
}
.about-title {
  font-family: 'Playfair Display', serif;
  font-weight: 700;
  font-style: italic;
  font-size: clamp(34px, 4.5vw, 60px);
  line-height: 1.2;
  margin: 0;
  background: linear-gradient(120deg, #ff79c6 25%, #ffe6f2 50%, #ff79c6 75%);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: titleShine 4s linear infinite;
  text-shadow: 0 0 15px rgba(255, 121, 198, 0.4), 0 0 30px rgba(255, 121, 198, 0.2);
  transition: transform 0.8s cubic-bezier(0.77, 0, 0.175, 1), opacity 0.8s ease;
  transform: translateY(0);
  opacity: 1;
}
.about-title.slide-out {
  transform: translateY(-100%);
  opacity: 0;
}
.about-title.slide-in {
  transform: translateY(100%);
  opacity: 0;
  transition: none;
}
@keyframes titleShine {
  0% { background-position: -100% center; }
  100% { background-position: 100% center; }
}
.about-desc-wrap {
  min-height: 220px;
  position: relative;
}
.about-description {
  font-size: clamp(13px, 1vw, 16px);
  font-weight: 300;
  line-height: 1.8;
  color: rgba(255, 255, 255, 0.75);
  letter-spacing: 0.03em;
  text-align: justify;
  transition: opacity 1s ease;
}
.about-description.fade-out {
  opacity: 0;
}
.about-description .word {
  display: inline-block;
  opacity: 0;
  transform: translateY(8px) scale(0.95);
  filter: blur(4px);
  transition: opacity 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94),
              transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94),
              filter 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  margin-right: 0.28em;
}
.about-description .word.visible {
  opacity: 1;
  transform: translateY(0) scale(1);
  filter: blur(0);
}

/* Page transitions */
.main-content, .glass-card {
  transition: opacity 1.5s cubic-bezier(0.77, 0, 0.175, 1), transform 1.5s cubic-bezier(0.77, 0, 0.175, 1);
}
.main-content.fade-out {
  opacity: 0 !important;
  transform: translateY(-30px);
  pointer-events: none;
}
.glass-card.fade-out {
  animation: none !important;
  opacity: 0 !important;
  transform: translateY(30px);
  pointer-events: none;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 1024px) {
  .about-section {
    padding: 20px 16px;
    align-items: flex-start;
    overflow-y: auto;
  }
  .about-container {
    grid-template-columns: 1fr;
    gap: 30px;
    padding: 35px 24px;
    margin: 40px auto;
    max-height: none;
  }
  .about-left {
    margin-bottom: 5px;
  }
  .fire-frame-wrapper {
    width: 250px;
    height: 330px;
  }
  .about-right {
    text-align: center;
  }
  .about-description {
    text-align: center;
  }
}
@media (max-width: 768px) {
  .music-controls { top: 16px; right: 16px; }
  .music-btn { width: 38px; height: 38px; font-size: 14px; }
  .volume-slider-wrap.open { width: 60px; }
  .volume-slider { width: 60px; }
  .glass-card { left: 16px; bottom: 70px; padding: 14px 16px; }
  .glow-orb { display: none; }
}
@media (max-width: 480px) {
  .glass-card { left: 12px; right: 12px; bottom: 60px; }
  .music-btn { width: 34px; height: 34px; font-size: 12px; }
}

/* ===== SOCIAL MEDIA BUTTONS ===== */
.about-socials {
  display: flex;
  gap: 20px;
  margin-top: 30px;
  opacity: 0;
  transform: translateY(20px);
  animation: fadeUp 1.2s ease 3.8s forwards;
}
@media (max-width: 1024px) {
  .about-socials {
    justify-content: center;
    margin-top: 24px;
  }
}
.social-btn {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid rgba(255, 255, 255, 0.07);
  display: flex;
  align-items: center;
  justify-content: center;
  color: rgba(255, 255, 255, 0.65);
  cursor: pointer;
  transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  position: relative;
  text-decoration: none;
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
}
.social-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle, rgba(201, 169, 110, 0.25) 0%, transparent 70%);
  opacity: 0;
  transition: opacity 0.4s ease;
  border-radius: 50%;
}
.social-btn:hover::before {
  opacity: 1;
}
.social-btn .social-icon {
  width: 20px;
  height: 20px;
  fill: currentColor;
  z-index: 1;
  transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}
.social-btn:hover {
  transform: translateY(-5px);
  color: #c9a96e;
  border-color: rgba(201, 169, 110, 0.4);
  box-shadow: 0 10px 25px rgba(201, 169, 110, 0.2);
}
.social-btn:hover .social-icon {
  transform: scale(1.15);
}

/* Tooltip styles */
.social-btn .tooltip {
  position: absolute;
  bottom: calc(100% + 12px);
  left: 50%;
  transform: translateX(-50%) translateY(6px);
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: rgba(255, 255, 255, 0.85);
  background: rgba(10, 10, 10, 0.95);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255, 255, 255, 0.15);
  padding: 6px 12px;
  border-radius: 6px;
  white-space: nowrap;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94),
              transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94),
              visibility 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  pointer-events: none;
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
  z-index: 100;
}
.social-btn:hover .tooltip {
  opacity: 1;
  visibility: visible;
  transform: translateX(-50%) translateY(0);
}

/* Brand specific hovers */
.social-btn.kick-btn:hover {
  color: #53FC18;
  border-color: rgba(83, 252, 24, 0.3);
  box-shadow: 0 10px 25px rgba(83, 252, 24, 0.15);
}
.social-btn.tiktok-btn:hover {
  color: #ffffff;
  border-color: rgba(255, 255, 255, 0.3);
  box-shadow: 0 10px 25px rgba(255, 255, 255, 0.15);
}
.social-btn.instagram-btn:hover {
  color: #E1306C;
  border-color: rgba(225, 48, 108, 0.3);
  box-shadow: 0 10px 25px rgba(225, 48, 108, 0.15);
}
.social-btn.discord-btn:hover {
  color: #5865F2;
  border-color: rgba(88, 101, 242, 0.3);
  box-shadow: 0 10px 25px rgba(88, 101, 242, 0.15);
}
</style>
</head>
<body>

<!-- PRELOADER -->
<div id="preloader">
  <div class="preloader-brand">AS ASMAA</div>
  <div class="preloader-line"></div>
  <div class="preloader-bar-wrap">
    <div class="preloader-bar-fill" id="preloaderBar"></div>
  </div>
  <div class="preloader-pct" id="preloaderPct">0%</div>
</div>

<!-- GLOW ORBS -->

<script>
(function(){
'use strict';

const IMAGE_COUNT = 13;
const INTERVAL_MS = 7000;
const FADE_DURATION = 1800;
const PRELOADER_MIN = 1200;

/* ===== PRELOADER ===== */
const preloader = document.getElementById('preloader');
const preloaderBar = document.getElementById('preloaderBar');
const preloaderPct = document.getElementById('preloaderPct');
let loadProgress = 0, preloaderDone = false, preloaderStart = Date.now();

function updatePreloader(pct) {
  loadProgress = Math.min(pct, 100);
  preloaderBar.style.width = loadProgress + '%';
  preloaderPct.textContent = Math.round(loadProgress) + '%';
  if (loadProgress >= 100) finishPreloader();
}

function finishPreloader() {
  if (preloaderDone) return;
  preloaderDone = true;
  const elapsed = Date.now() - preloaderStart;
  const delay = Math.max(0, PRELOADER_MIN - elapsed);
  setTimeout(() => {
    preloader.classList.add('hidden');
    startTransitionTimer();
  }, delay);
}

let simProgress = 0;
const simInterval = setInterval(() => {
  simProgress += 3 + Math.random() * 6;
  if (simProgress >= 100) { simProgress = 100; clearInterval(simInterval); }
  updatePreloader(simProgress);
}, 120);
window.addEventListener('load', () => updatePreloader(100));
setTimeout(() => updatePreloader(100), 5000);

/* ===== BACKGROUND SLIDER ===== */
const slider = document.getElementById('bgSlider');
const slides = [];
const imageFiles = [];
for (let i = 1; i <= IMAGE_COUNT; i++) imageFiles.push(`image/background_${i}.jpg`);

imageFiles.forEach((src, i) => {
  const div = document.createElement('div');
  div.className = 'bg-slide' + (i === 0 ? ' active' : '');
  div.style.backgroundImage = `url(${src})`;
  slider.appendChild(div);
  slides.push(div);
});
imageFiles.forEach(src => { const img = new Image(); img.src = src; });

/* ===== SLIDER LOGIC ===== */
let currentIndex = 0, isTransitioning = false, autoTimer = null;

function goToSlide(index) {
  if (isTransitioning || index === currentIndex) return;
  isTransitioning = true;
  const prev = currentIndex;
  currentIndex = index;

  slides.forEach((s, i) => {
    s.classList.remove('active', 'prev');
    if (i === currentIndex) {
      s.style.transition = `opacity ${FADE_DURATION}ms cubic-bezier(0.77, 0, 0.175, 1), transform 7s cubic-bezier(0.25, 0.46, 0.45, 0.94)`;
    }
  });

  slides[prev].classList.add('prev');
  slides[prev].style.transition = `opacity ${FADE_DURATION}ms cubic-bezier(0.77, 0, 0.175, 1), transform ${FADE_DURATION}ms ease`;

  slides[currentIndex].classList.add('active');
  slides[currentIndex].style.transform = 'scale(1)';
  requestAnimationFrame(() => {
    requestAnimationFrame(() => { slides[currentIndex].style.transform = 'scale(1.08)'; });
  });

  setTimeout(() => { slides[prev].classList.remove('prev'); isTransitioning = false; }, FADE_DURATION);
  resetAutoTimer();
}

function nextSlide() { goToSlide((currentIndex + 1) % IMAGE_COUNT); }
function resetAutoTimer() { clearInterval(autoTimer); autoTimer = setInterval(nextSlide, INTERVAL_MS); }

autoTimer = setInterval(nextSlide, INTERVAL_MS);

/* ===== PARTICLES ===== */
const canvas = document.getElementById('particles-canvas');
const ctx = canvas.getContext('2d');
let particles = [];

function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

class Particle {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = Math.random() * 2.5 + 0.5;
    this.speedX = (Math.random() - 0.5) * 0.15;
    this.speedY = (Math.random() - 0.5) * 0.15 - 0.05;
    this.opacity = Math.random() * 0.5 + 0.1;
    this.pulse = Math.random() * Math.PI * 2;
    this.pulseSpeed = 0.01 + Math.random() * 0.02;
  }
  update() {
    this.x += this.speedX; this.y += this.speedY; this.pulse += this.pulseSpeed;
    if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
  }
  draw() {
    const alpha = this.opacity * (0.7 + 0.3 * Math.sin(this.pulse));
    ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(201, 169, 110, ${alpha})`; ctx.fill();
  }
}

for (let i = 0; i < 80; i++) particles.push(new Particle());

let mouseX = 0, mouseY = 0;
document.addEventListener('mousemove', e => {
  mouseX = (e.clientX / canvas.width - 0.5) * 2;
  mouseY = (e.clientY / canvas.height - 0.5) * 2;
});

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => { p.update(); p.x += mouseX * 0.05; p.y += mouseY * 0.03; p.draw(); });
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 120) {
        ctx.beginPath(); ctx.moveTo(particles[i].x, particles[i].y); ctx.lineTo(particles[j].x, particles[j].y);
        ctx.strokeStyle = `rgba(201, 169, 110, ${0.06 * (1 - dist / 120)})`; ctx.lineWidth = 0.5; ctx.stroke();
      }
    }
  }
  requestAnimationFrame(animateParticles);
}
animateParticles();

/* ===== MOUSE PARALLAX ===== */
const content = document.querySelector('.main-content');
document.addEventListener('mousemove', e => {
  const x = (e.clientX / window.innerWidth - 0.5) * 8;
  const y = (e.clientY / window.innerHeight - 0.5) * 8;
  content.style.transform = `translate(${x}px, ${y}px)`;
});

/* ===== AUDIO ===== */
const audio = document.getElementById('bgAudio');
const muteBtn = document.getElementById('muteBtn');
const muteIcon = document.getElementById('muteIcon');
const volumeSlider = document.getElementById('volumeSlider');
const volumeWrap = document.getElementById('volumeWrap');
let isMuted = false, isPlaying = false;

audio.volume = 0.3;

function toggleMute() {
  isMuted = !isMuted;
  audio.muted = isMuted;
  muteIcon.innerHTML = isMuted ? '&#10005;' : '&#9834;';
  muteBtn.querySelector('.tooltip').textContent = isMuted ? 'Unmute' : 'Mute';
}

muteBtn.addEventListener('click', toggleMute);

volumeSlider.addEventListener('input', () => {
  audio.volume = parseFloat(volumeSlider.value);
  if (audio.volume === 0) muteIcon.innerHTML = '&#10005;';
  else if (isMuted) { isMuted = false; audio.muted = false; muteIcon.innerHTML = '&#9834;'; muteBtn.querySelector('.tooltip').textContent = 'Mute'; }
});

muteBtn.addEventListener('mouseenter', () => volumeWrap.classList.add('open'));
muteBtn.addEventListener('mouseleave', () => {
  setTimeout(() => { if (!volumeSlider.matches(':hover')) volumeWrap.classList.remove('open'); }, 300);
});
volumeWrap.addEventListener('mouseenter', () => volumeWrap.classList.add('open'));
volumeWrap.addEventListener('mouseleave', () => volumeWrap.classList.remove('open'));

function tryPlayAudio() {
  if (isPlaying) return;
  audio.play().then(() => { isPlaying = true; }).catch(() => {});
}
document.addEventListener('click', tryPlayAudio, { once: true });
document.addEventListener('touchstart', tryPlayAudio, { once: true });
document.addEventListener('keydown', tryPlayAudio, { once: true });
tryPlayAudio();

/* ===== ROTATING TITLES ===== */
(function(){
  const els = document.querySelectorAll('.rot');
  if (!els.length) return;
  let cur = 0;
  els.forEach((e, i) => { if (i !== 0) e.classList.remove('show'); });
  setInterval(() => {
    const prev = cur;
    cur = (cur + 1) % els.length;
    els[prev].classList.remove('show');
    els[prev].classList.add('hide');
    setTimeout(() => els[prev].classList.remove('hide'), 900);
    els[cur].classList.add('show');
    els[cur].classList.remove('hide');
  }, 10000);
})();

/* ===== ABOUT SECTION LOGIC ===== */
const englishText = "As Asmaa, known in the gaming and livestreaming world by the nickname Saymina Elis, is a content creator and gamer recognized for her confident personality and strong on-screen presence. She is known for her calm yet self-assured style, combined with a competitive spirit that never backs down from challenges in games. She has a natural ability to connect with her audience, blending seriousness with humor during her live streams, making viewers feel like they are part of the experience. Passionate about delivering entertaining, high-quality content, she is constantly striving to improve her skills while building a positive and welcoming community around her love for gaming.";
const frenchText = "AS ASMAA, connue dans le monde du jeu et de la diffusion en direct par le surnom Saymina Elis, est une créatrice de contenu et une gameuse reconnue pour sa personnalité confiante et sa forte présence à l'écran. Elle est connue pour son style calme mais sûr de lui, combiné à un esprit compétitif qui ne recule jamais devant les défis des jeux. Elle a une capacité naturelle à se connecter avec son public, mêlant sérieux et humour pendant ses diffusions en direct, donnant aux spectateurs l'impression de faire partie de l'expérience. Passionnée par la livraison de contenu divertissant et de haute qualité, elle s'efforce constamment d'améliorer ses compétences tout en construisant une communauté positive et accueillante autour de son amour pour les jeux vidéo.";

function startTransitionTimer() {
  setTimeout(() => {
    // Hide main-content & glass-card
    const mainContent = document.querySelector('.main-content');
    const glassCard = document.querySelector('.glass-card');
    if (mainContent) mainContent.classList.add('fade-out');
    if (glassCard) glassCard.classList.add('fade-out');
    
    // Show about section after fade out completes
    setTimeout(() => {
      const aboutSection = document.getElementById('aboutSection');
      if (aboutSection) {
        aboutSection.classList.add('show');
        startAboutSectionAnimations();
      }
    }, 1500);
  }, 10000);
}

function startAboutSectionAnimations() {
  // 1. Slideshow
  const slides = document.querySelectorAll('.about-slide');
  let currentSlideIndex = 0;
  
  function nextSlide() {
    const prev = currentSlideIndex;
    currentSlideIndex = (currentSlideIndex + 1) % slides.length;
    
    slides[prev].classList.remove('active');
    slides[prev].classList.add('prev');
    
    slides[currentSlideIndex].classList.add('active');
    
    setTimeout(() => {
      slides[prev].classList.remove('prev');
    }, 1500);
  }
  
  // Transition every 5 seconds
  setInterval(nextSlide, 5000);
  
  // Preload about images to avoid flicker
  const aboutImages = ['assiste/about1.png', 'assiste/profil1.png', 'assiste/about2.png', 'assiste/profil2.png'];
  aboutImages.forEach(src => {
    const img = new Image();
    img.src = src;
  });

  // 2. Title Transition (About Me / Sur Moi) every 7 seconds
  const titleEl = document.getElementById('aboutTitle');
  const titles = ["About Me", "Sur Moi"];
  let currentTitleIndex = 0;
  
  function nextTitle() {
    titleEl.classList.add('slide-out');
    setTimeout(() => {
      currentTitleIndex = (currentTitleIndex + 1) % titles.length;
      titleEl.textContent = titles[currentTitleIndex];
      titleEl.classList.remove('slide-out');
      titleEl.classList.add('slide-in');
      
      // Force style reflow
      void titleEl.offsetWidth;
      
      titleEl.classList.remove('slide-in');
    }, 800);
  }
  
  setInterval(nextTitle, 7000);

  // 3. Description Typewriter Loop
  const descElement = document.getElementById('aboutDescription');
  let currentLang = 'en';
  
  function typeText(text, callback) {
    descElement.innerHTML = '';
    descElement.classList.remove('fade-out');
    
    const words = text.split(' ');
    const spans = words.map(word => {
      const span = document.createElement('span');
      span.className = 'word';
      span.textContent = word;
      descElement.appendChild(span);
      const space = document.createTextNode(' ');
      descElement.appendChild(space);
      return span;
    });
    
    let index = 0;
    function revealNextWord() {
      if (index < spans.length) {
        spans[index].classList.add('visible');
        index++;
        // Smoothly stagger word reveals
        setTimeout(revealNextWord, 80);
      } else {
        if (callback) callback();
      }
    }
    
    setTimeout(revealNextWord, 400);
  }
  
  function nextCycle() {
    const activeText = currentLang === 'en' ? englishText : frenchText;
    typeText(activeText, () => {
      // Stay visible for 7 seconds
      setTimeout(() => {
        descElement.classList.add('fade-out');
        // Wait for fade-out transition, then swap language
        setTimeout(() => {
          currentLang = currentLang === 'en' ? 'fr' : 'en';
          nextCycle();
        }, 1100);
      }, 7000);
    });
  }
  
  nextCycle();
}

/* ===== DISCORD ID COPY LOGIC ===== */
const discordBtn = document.querySelector('.discord-btn');
if (discordBtn) {
  discordBtn.addEventListener('click', e => {
    e.preventDefault();
    const discordId = '1057641152985178123';

        const originalText = tooltip.textContent;
        tooltip.textContent = 'Copied ID!';
        setTimeout(() => { tooltip.textContent = originalText; }, 2000);
      }
    }).catch(err => {
      console.error('Failed to copy text: ', err);
    });
    setTimeout(() => {
      window.open('https://discord.com/users/1057641152985178123', '_blank', 'noopener,noreferrer');
    }, 250);
  });
}

/* ===== KEYBOARD NAVIGATION ===== */
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nextSlide();
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') goToSlide((currentIndex - 1 + IMAGE_COUNT) % IMAGE_COUNT);
  if (e.key === 'm' || e.key === 'M') toggleMute();
});

})();
</script>
